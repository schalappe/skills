# git-cliff configuration
# https://git-cliff.org/docs/configuration
#
# Tailored for a repo that ships only agentic skills. The commit scope
# should be the skill directory name (e.g. `feat(tdd): ...`).

[changelog]
header = """
# Changelog

All notable changes to this repo's agentic skills are documented here.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)
and follows [Conventional Commits](https://www.conventionalcommits.org/).

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | split(pat="\n") | first | upper_first | trim }}\
{% if commit.remote.pr_number %} (#{{ commit.remote.pr_number }}){% endif %}
{%- endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^docs", group = "Changed" },
    { message = "^refactor", group = "Changed" },
    { message = "^perf", group = "Changed" },
    { message = "^revert", group = "Removed" },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
    { message = "^test", skip = true },
    { message = "^style", skip = true },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true
initial_tag = "0.1.0"
